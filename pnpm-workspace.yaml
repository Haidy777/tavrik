packages:
  - 'src/*'

blockExoticSubdeps: true

catalog:
  '@types/node': 24.12.2
  kysely: 0.28.16
  pg: 8.20.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  typescript: 6.0.3

engineStrict: true

minimumReleaseAge: 1440

onlyBuiltDependencies:
  - '@openrouter/sdk'
  - esbuild
  - protobufjs
  - sharp

optimisticRepeatInstall: true

strictDepBuilds: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar

verifyDepsBeforeRun: error
