packages:
  - 'src/*'

strictDepBuilds: true

blockExoticSubdeps: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar

engineStrict: true

verifyDepsBeforeRun: error

optimisticRepeatInstall: true

onlyBuiltDependencies:
  - esbuild
  - sharp

catalog:
  '@types/node': 24.12.2
  kysely: 0.28.16
  pg: 8.20.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  typescript: 5.8.3
